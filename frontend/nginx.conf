server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Allow up to 100MB uploads for video files
    client_max_body_size 100M;

    # PWA Service Worker & Manifest Cache Control (migrated from vercel.json)
    location ~* (sw\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Proxy API requests to the backend container
    # 'backend' is the service name in docker-compose, port 8001
    location /api/ {
        rewrite ^/api/api/(.*)$ /api/$1 break;
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # Proxy Socket.io requests to backend
    location /socket.io/ {
        proxy_pass http://backend:8001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # SPA Fallback Routing (migrated from vercel.json)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
