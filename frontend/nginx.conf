server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Allow up to 100MB uploads for video files
    client_max_body_size 100M;

    # PWA Service Worker & Manifest Cache Control (migrated from vercel.json)
    location ~* (sw\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Proxy API requests to the backend container
    # The frontend uses VITE_API_URL=/api, so all API calls start with /api
    location /api/ {
        # 'backend' is the service name in docker-compose
        proxy_pass https://backend-app.internal.kindstone-93c47c39.southafricanorth.azurecontainerapps.io;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host backend-app.internal.kindstone-93c47c39.southafricanorth.azurecontainerapps.io;
    }

    # Proxy Socket.io requests to backend if needed
    location /socket.io/ {
        proxy_pass https://backend-app.internal.kindstone-93c47c39.southafricanorth.azurecontainerapps.io/socket.io/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host backend-app.internal.kindstone-93c47c39.southafricanorth.azurecontainerapps.io;
    }

    # SPA Fallback Routing (migrated from vercel.json)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
